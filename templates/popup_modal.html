<!-- 首次访问弹窗模板 -->
<div id="first-visit-popup" class="popup-overlay" style="display: none;">
  <div class="popup-container">
    <div class="popup-header">
      <h2 id="popup-title">网站声明</h2>
      <button id="popup-close" class="popup-close-btn" aria-label="关闭弹窗">&times;</button>
    </div>

    <div class="popup-content" id="popup-content-area">
      <div class="popup-loading">加载中...</div>
    </div>

    <div class="popup-footer">
      <!-- Content type toggle -->
      <div class="popup-toggle-group" role="group" aria-label="Content type">
        <button class="popup-toggle-btn active" data-content="declaration">网站声明</button>
        <button class="popup-toggle-btn" data-content="terms">站长的话</button>
      </div>
      <!-- Language toggle -->
      <div class="popup-toggle-group" role="group" aria-label="Language">
        <button class="popup-toggle-btn" data-lang="zh">中文</button>
        <button class="popup-toggle-btn active" data-lang="en">English</button>
      </div>
    </div>
  </div>
</div>
